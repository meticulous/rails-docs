# Kamal deployment for api.rubyonrails.org. Real values for the
# Foundation deploy live in `.kamal/secrets` and are wired through
# the placeholders below — search for `# TODO(deploy):` and fill in.
#
# Architecture:
#
#   ┌──────────────────────────────┐
#   │ Kamal proxy (Let's Encrypt)  │  443 → app:3000
#   ├──────────────────────────────┤
#   │ web container (Puma + SQ)    │  Solid Queue runs in-process
#   ├──────────────────────────────┤
#   │ postgres accessory           │  16432 ← app over local docker net
#   └──────────────────────────────┘
#
# Solid Cache + Solid Queue both live in their own Postgres database
# files (config/database.yml), separate from the primary documentation
# database — keeps high-write tables out of replicas.

service: rails-docs

# Container image. Foundation pipeline pushes to GitHub Container
# Registry; bin/kamal deploy will pull this tag.
image: rails-foundation/rails-docs

servers:
  web:
    # TODO(deploy): replace with the real production host(s).
    - 192.168.0.1

# Kamal proxy terminates SSL with Let's Encrypt and forwards to Puma.
# Pairs with `assume_ssl = true` and `force_ssl = true` in production.rb.
proxy:
  ssl: true
  host: api.rubyonrails.org
  app_port: 3000
  healthcheck:
    path: /up
    interval: 5

# Container registry — Foundation uses ghcr.io.
registry:
  server: ghcr.io
  username: rails-foundation
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
    - POSTGRES_PASSWORD
    - INGEST_WEBHOOK_SECRET
  clear:
    # Solid Queue runs inside Puma. If/when ingest gets heavy enough
    # to need its own host, split into a separate `job` server group
    # and unset SOLID_QUEUE_IN_PUMA.
    SOLID_QUEUE_IN_PUMA: true
    JOB_CONCURRENCY: 2

    # WEB_CONCURRENCY = number of Puma workers. Tune per host CPU.
    WEB_CONCURRENCY: 2

    # Hostname allowlist consumed by config/environments/production.rb.
    RAILS_ALLOWED_HOSTS: api.rubyonrails.org

    # Primary DB lives in the postgres accessory below.
    DB_HOST: rails-docs-db
    DB_PORT: "5432"

    # Path to the rails_docs_ingester binary inside the container —
    # baked in via Dockerfile copy. IngestPackageVersionJob requires
    # this; no laptop-path fallback.
    INGESTER_BIN: /rails/bin/rails_docs_ingester

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell:   app exec --interactive --reuse "bash"
  logs:    app logs -f
  dbc:     app exec --interactive --reuse "bin/rails dbconsole --include-password"
  # Backfill a single Rails version on the production box. Pass the
  # version through `args:`. Example:
  #   bin/kamal app exec "bin/rails ingest:rails VERSION=8.1.3"
  ingest:  app exec --interactive --reuse "bin/rails ingest:rails"

# Persistent volumes — postgres data lives in the accessory volume; the
# app container only needs `storage/` for transient artifacts (ingest
# JSONL output, generated static-export bundles).
volumes:
  - "rails_docs_storage:/rails/storage"

# Bridge fingerprinted assets between versions so in-flight requests
# don't 404 during a deploy.
asset_path: /rails/public/assets

builder:
  arch: amd64
  # If/when CI runs on arm64 boxes, point this at a remote amd64
  # builder rather than emulating.
  # remote: ssh://docker@docker-builder-server

# Deploy as a non-root user. The Dockerfile creates `rails:rails`.
ssh:
  user: deploy

accessories:
  db:
    image: postgres:16
    host: 192.168.0.1   # TODO(deploy): same as web for single-host; split for HA
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: rails_docs
        POSTGRES_DB: rails_docs_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
